<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RTN - The Noobs of Temple &amp; Rift</title>
  <desc id="desc">Square RTN logo mark for The Noobs of Temple &amp; Rift.</desc>
  <defs>
    <linearGradient id="rtnGradient" x1="80" y1="60" x2="430" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="0.5" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#0B0F1A"/>
  <circle cx="256" cy="250" r="194" fill="url(#glow)"/>
  <g filter="url(#shadow)">
    <text x="256" y="270" text-anchor="middle" fill="url(#rtnGradient)" font-family="Inter, Arial, sans-serif" font-size="148" font-weight="900" letter-spacing="-0.08em">RTN</text>
  </g>
  <path d="M112 335H400" stroke="url(#rtnGradient)" stroke-width="14" stroke-linecap="round"/>
  <text x="256" y="385" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" letter-spacing="0.12em">THE NOOBS OF</text>
  <text x="256" y="420" text-anchor="middle" fill="#D1D5DB" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" letter-spacing="0.10em">TEMPLE &amp; RIFT</text>
</svg>
