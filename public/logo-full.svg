<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RTN - The Noobs of Temple &amp; Rift</title>
  <desc id="desc">Official RTN wordmark logo for The Noobs of Temple &amp; Rift gaming community.</desc>
  <defs>
    <linearGradient id="rtnGradient" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="0.55" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="44" fill="#0B0F1A"/>
  <circle cx="195" cy="180" r="130" fill="url(#glow)"/>

  <g filter="url(#softShadow)">
    <text x="92" y="220" fill="url(#rtnGradient)" font-family="Inter, Arial, sans-serif" font-size="138" font-weight="900" letter-spacing="-0.08em">RTN</text>
  </g>

  <path d="M455 92L1035 92" stroke="url(#rtnGradient)" stroke-width="8" stroke-linecap="round"/>
  <text x="455" y="164" fill="white" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" letter-spacing="-0.02em">The Noobs of</text>
  <text x="455" y="220" fill="url(#rtnGradient)" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="900" letter-spacing="-0.03em">Temple &amp; Rift</text>
  <text x="457" y="266" fill="#9CA3AF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="0.24em">GAMING COMMUNITY</text>
</svg>
